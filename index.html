<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經戰鬥陀螺：無極擂台</title>
<style>
    body {
        margin: 0;
        background-color: #1a1a1a;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh; /* 確保佔滿整個手機螢幕高度 */
        overflow: hidden;
    }
    #game-container {
        width: 100vw;
        height: 80vh; /* 留一點空間給底部的文字 */
        display: flex;
        justify-content: center;
        align-items: center;
    }
    canvas {
        max-width: 100%;
        max-height: 100%;
        aspect-ratio: 1 / 1; /* 強制保持正方形 */
        box-shadow: 0 15px 35px rgba(0,0,0,0.8); /* 整個競技場的外部陰影 */
        border-radius: 50%; /* 讓畫布外框看起來也是圓的 */
        background-color: #2a2a2a; /* 深色底色襯托立體感 */
    }
    .instructions {
        margin-top: 10px;
        font-size: 13px;
        color: #aaa;
        text-align: center;
        padding: 0 15px;
    }
</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div class="instructions">
        【操作指南】上半部區域雙擊螢幕生成 P1 陀螺（第一次點擊定上卦，第二次點擊定下卦並發射）<br>
        下半部區域雙擊螢幕生成 P2 陀螺。撞擊力道過大會觸發時空凝結與爻變！
    </div>

    <script src="script.js"></script>
</body>
</html>

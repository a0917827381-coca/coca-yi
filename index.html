<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經戰鬥陀螺：無極擂台</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background-color: #f5f5f0;
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            line-height: 1.6;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div class="instructions">
        【操作指南】左半邊區域雙擊滑鼠生成 P1 陀螺（第一次點擊定上卦，第二次點擊定下卦並發射）<br>
        右半邊區域雙擊滑鼠生成 P2 陀螺。撞擊力道過大會觸發時空凝結與爻變突風！
    </div>

    <script src="script.js"></script>
</body>
</html>
